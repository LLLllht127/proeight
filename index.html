<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上城区政协委员通</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary-red: #C41E3A;
            --deep-red: #8B0000;
            --gold: #D4AF37;
            --gold-light: #F0D78C;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --text-dark: #2d2d2d;
            --text-light: #666;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 60px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            scroll-behavior: auto;
            font-size: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-red) rgba(0,0,0,0.1);
        }
        html::-webkit-scrollbar { width: 8px; }
        html::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        html::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary-red), var(--deep-red)); border-radius: 4px; }
        html::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes revealFromLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes revealFromRight {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleReveal {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes scrollBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }
        @keyframes progressBar {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        /* ===== SCROLL PROGRESS BAR ===== */
        .scroll-progress {
            position: fixed; top: 0; left: 0; height: 3px; z-index: 1001;
            background: linear-gradient(90deg, var(--gold) 0%, var(--primary-red) 50%, var(--gold) 100%);
            transform-origin: left; transition: transform 0.1s linear;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        /* ===== SCROLL SIDE INDICATOR ===== */
        .scroll-indicator {
            position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
            z-index: 998; display: flex; flex-direction: column; gap: 1rem;
        }
        .scroll-indicator-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(196,30,58,0.2); border: 2px solid rgba(196,30,58,0.3);
            transition: var(--transition); cursor: pointer; position: relative;
        }
        .scroll-indicator-dot::before {
            content: attr(data-label); position: absolute; right: 22px; top: 50%;
            transform: translateY(-50%); white-space: nowrap;
            background: var(--primary-red); color: white;
            padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.75rem;
            opacity: 0; pointer-events: none; transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .scroll-indicator-dot:hover::before { opacity: 1; }
        .scroll-indicator-dot.active {
            background: var(--primary-red); border-color: var(--primary-red);
            box-shadow: 0 0 12px rgba(196,30,58,0.4);
            transform: scale(1.3);
        }

        /* ===== FULL PAGE NAVIGATION MAP ===== */
        .nav-map {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            z-index: 998; display: flex; align-items: center; gap: 0.25rem;
            background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(12px);
            padding: 0.5rem 1rem; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: var(--transition);
            opacity: 0; transform: translateX(-50%) translateY(20px);
        }
        .nav-map.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .nav-map-item {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.35rem 0.7rem; border-radius: 20px;
            color: rgba(255,255,255,0.6); font-size: 0.75rem; font-weight: 500;
            cursor: pointer; transition: var(--transition); white-space: nowrap;
            text-decoration: none; border: none; background: none;
            font-family: inherit;
        }
        .nav-map-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-map-item.active {
            color: white; background: var(--primary-red);
            box-shadow: 0 2px 8px rgba(196,30,58,0.4);
        }
        .nav-map-divider {
            width: 1px; height: 16px; background: rgba(255,255,255,0.15);
            margin: 0 0.15rem;
        }
        .nav-map-keyhint {
            color: rgba(255,255,255,0.3); font-size: 0.65rem;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 3px;
            padding: 0 3px; line-height: 1.4; margin-left: 2px;
        }

        /* ===== SCROLL TOOLTIP ===== */
        .scroll-tooltip {
            position: fixed; left: 50%; bottom: 6rem; transform: translateX(-50%);
            z-index: 999; background: rgba(26, 26, 46, 0.9); backdrop-filter: blur(12px);
            color: white; padding: 0.6rem 1.2rem; border-radius: 12px;
            font-size: 0.82rem; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; transition: opacity 0.4s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .scroll-tooltip.visible { opacity: 1; }

        /* ===== HEADER ===== */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: linear-gradient(135deg, var(--deep-red) 0%, var(--primary-red) 100%);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        .header.scrolled { padding: 0.5rem 2rem; background: rgba(139, 0, 0, 0.98); backdrop-filter: blur(10px); }
        .header-nav { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-logo { display: flex; align-items: center; gap: 1rem; color: white; text-decoration: none; }
        .header-logo-icon {
            width: 48px; height: 48px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; color: var(--deep-red);
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
            transition: var(--transition);
        }
        .header-logo:hover .header-logo-icon { transform: rotate(-5deg) scale(1.05); }
        .header-logo-text { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; }
        .header-links { display: flex; gap: 0.5rem; list-style: none; }
        .header-links a {
            color: white; text-decoration: none; font-weight: 500; font-size: 0.95rem;
            padding: 0.5rem 1rem; border-radius: 8px; transition: var(--transition);
            position: relative;
        }
        .header-links a::after {
            content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 2px; background: var(--gold); transition: width 0.3s ease; border-radius: 1px;
        }
        .header-links a:hover::after { width: 60%; }
        .header-links a:hover { background: rgba(255,255,255,0.1); }
        .header-links a.active { background: rgba(255,255,255,0.15); }
        .header-links a.active::after { width: 60%; }
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 10px; background: none; border: none; }
        .menu-toggle span { width: 25px; height: 3px; background: white; border-radius: 2px; transition: var(--transition); }
        .menu-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh; background: linear-gradient(135deg, var(--deep-red) 0%, var(--primary-red) 50%, #E63946 100%);
            position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(212,175,55,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.05) 0%, transparent 40%);
        }
        .hero-pattern {
            position: absolute; inset: 0; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .hero-deco { position: absolute; border-radius: 50%; border: 2px solid rgba(255,255,255,0.08); }
        .hero-deco:nth-child(1) { width: 500px; height: 500px; top: -150px; right: -150px; animation: pulse 6s ease-in-out infinite; }
        .hero-deco:nth-child(2) { width: 350px; height: 350px; bottom: -80px; left: -80px; animation: pulse 6s ease-in-out infinite 2s; }
        .hero-deco:nth-child(3) { width: 200px; height: 200px; top: 20%; left: 10%; animation: float 8s ease-in-out infinite; border-color: rgba(212,175,55,0.1); }
        .hero-content { text-align: center; color: white; z-index: 10; padding: 2rem; animation: fadeInUp 1s ease; }
        .hero-badge {
            display: inline-block; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--deep-red); padding: 0.5rem 1.5rem; border-radius: 50px;
            font-weight: 600; margin-bottom: 1.5rem; animation: fadeInUp 1s ease 0.2s both;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }
        .hero-title {
            font-family: 'Noto Serif SC', serif; font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700; margin-bottom: 1rem; letter-spacing: 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .hero-subtitle { font-size: 1.2rem; opacity: 0.9; max-width: 600px; margin: 0 auto 2rem; line-height: 1.8; font-weight: 300; }
        .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; animation: fadeInUp 1s ease 0.4s both; }
        .btn {
            padding: 0.9rem 2rem; border-radius: 50px; font-weight: 600; text-decoration: none;
            transition: var(--transition); display: inline-flex; align-items: center; gap: 0.5rem;
            cursor: pointer; border: none; font-size: 1rem; font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--deep-red); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(212,175,55,0.4); }
        .btn-outline { border: 2px solid rgba(255,255,255,0.6); color: white; background: transparent; }
        .btn-outline:hover { background: white; color: var(--primary-red); border-color: white; }
        .hero-scroll-hint {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 0.85rem;
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            animation: scrollBounce 2s ease-in-out infinite;
            transition: opacity 0.5s ease;
        }
        .hero-scroll-hint .scroll-mouse {
            width: 26px; height: 42px; border: 2px solid rgba(255,255,255,0.5);
            border-radius: 13px; position: relative; margin-bottom: 0.3rem;
        }
        .hero-scroll-hint .scroll-mouse::after {
            content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 2px; animation: scrollBounce 1.5s ease-in-out infinite;
        }
        .hero-scroll-hint span:last-child { letter-spacing: 2px; font-size: 0.75rem; }
        .hero-content { transition: transform 0.1s linear, opacity 0.3s ease; }

        /* ===== STATS ===== */
        .stats {
            background: white; padding: 3rem 2rem; margin-top: -3rem;
            position: relative; z-index: 20; border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
        }
        .stats-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .stat-item {
            text-align: center; padding: 1.5rem 1rem; border-radius: 16px;
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            transition: var(--transition); border: 1px solid rgba(196,30,58,0.05);
        }
        .stat-item:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: rgba(212,175,55,0.2); }
        .stat-number { font-family: 'Noto Serif SC', serif; font-size: 3rem; font-weight: 700; color: var(--primary-red); line-height: 1; }
        .stat-number span { color: var(--gold); }
        .stat-label { color: var(--text-light); margin-top: 0.5rem; font-size: 0.95rem; }

        /* ===== SECTIONS ===== */
        .section { padding: 5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-tag {
            display: inline-block; background: linear-gradient(135deg, var(--primary-red) 0%, var(--deep-red) 100%);
            color: white; padding: 0.4rem 1.2rem; border-radius: 50px;
            font-size: 0.8rem; font-weight: 500; margin-bottom: 1rem; letter-spacing: 1px;
        }
        .section-title { font-family: 'Noto Serif SC', serif; font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700; color: var(--text-dark); margin-bottom: 1rem; }
        .section-desc { color: var(--text-light); max-width: 600px; margin: 0 auto; font-size: 1.05rem; }

        /* ===== MODULES ===== */
        .modules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .module-card {
            background: white; border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition); cursor: pointer;
            position: relative;
        }
        .module-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-hover); }
        .module-image {
            height: 220px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .module-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .module-card:hover .module-image img { transform: scale(1.08); }
        .module-image-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--deep-red) 100%);
            z-index: 1;
        }
        .module-image-icon { position: absolute; z-index: 2; font-size: 3.5rem; opacity: 0.15; }
        .module-overlay {
            position: absolute; inset: 0; z-index: 3;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
            display: flex; align-items: flex-end; padding: 1.5rem;
        }
        .module-overlay h3 { color: white; font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 600; }
        .module-number {
            position: absolute; top: 1rem; right: 1rem; z-index: 4;
            background: var(--gold); color: var(--deep-red);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(212,175,55,0.4);
        }
        .module-click-hint {
            position: absolute; bottom: 1rem; right: 1rem; z-index: 5;
            background: var(--gold); color: var(--deep-red);
            padding: 0.4rem 1rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 500;
            opacity: 0; transform: translateY(10px); transition: var(--transition);
        }
        .module-card:hover .module-click-hint { opacity: 1; transform: translateY(0); }
        .module-content { padding: 1.5rem; }
        .module-content h3 { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.6rem; }
        .module-content p { color: var(--text-light); font-size: 0.9rem; line-height: 1.6; }
        .module-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
        .module-tag { background: #fff5f5; color: var(--primary-red); padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.78rem; font-weight: 500; }

        /* ===== GALLERY ===== */
        .gallery-section { background: linear-gradient(180deg, #fff 0%, #fff5f5 100%); padding: 5rem 2rem; }
        .gallery-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
        .gallery-item {
            position: relative; border-radius: var(--radius); overflow: hidden;
            aspect-ratio: 4/3; cursor: pointer; box-shadow: var(--shadow);
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
            transition: var(--transition);
        }
        .gallery-item:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(139, 0, 0, 0.9) 0%, rgba(139, 0, 0, 0.2) 40%, transparent 60%);
            opacity: 0; transition: opacity 0.3s ease;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 1.25rem;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-overlay h4 { color: white; font-family: 'Noto Serif SC', serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
        .gallery-overlay p { color: rgba(255,255,255,0.8); font-size: 0.8rem; line-height: 1.4; }
        .gallery-load-more {
            text-align: center; margin-top: 2rem;
        }
        .gallery-load-more .btn { font-size: 0.95rem; }

        /* ===== STUDIOS (Module Card Style) ===== */
        .studios-section { padding: 5rem 2rem; background: linear-gradient(180deg, #fff5f5 0%, #fff 100%); }
        .studios-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .studio-card {
            background: white; border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition); cursor: pointer;
            position: relative;
        }
        .studio-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-hover); }
        .studio-image { height: 240px; overflow: hidden; position: relative; background: #f0f0f0; }
        .studio-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .studio-card:hover .studio-image img { transform: scale(1.08); }
        .studio-badge {
            position: absolute; top: 1rem; left: 1rem;
            padding: 0.3rem 0.8rem; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600; z-index: 2;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .studio-badge.five { background: linear-gradient(135deg, #D4AF37, #F0D78C); color: #5D4E00; }
        .studio-badge.four { background: linear-gradient(135deg, #8B8B8B, #C0C0C0); color: #333; }
        .studio-badge.three { background: linear-gradient(135deg, #CD7F32, #E8A85C); color: #5D3A00; }
        .studio-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 50%, transparent 100%);
            display: flex; align-items: flex-end; padding: 1.25rem;
            opacity: 0; transition: var(--transition);
        }
        .studio-card:hover .studio-overlay { opacity: 1; }
        .studio-overlay h4 { color: white; font-family: 'Noto Serif SC', serif; font-size: 1.05rem; font-weight: 600; }
        .studio-click-hint {
            position: absolute; bottom: 1rem; right: 1rem; z-index: 3;
            background: var(--gold); color: var(--deep-red);
            padding: 0.4rem 1rem; border-radius: 20px;

        // ===== CUSTOM HOOKS =====

        // Scroll position tracking with progress
        function useScrollPosition() {
            const [scrollY, setScrollY] = useState(0);
            const [activeSection, setActiveSection] = useState('home');
            const [scrollProgress, setScrollProgress] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    const y = window.scrollY;
                    setScrollY(y);
                    // Progress
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    const progress = docHeight > 0 ? y / docHeight : 0;
                    setScrollProgress(progress);
                    // Active section
                    const sections = navItems.map(item => document.getElementById(item.id)).filter(Boolean);
                    let current = 'home';
                    for (const section of sections) {
                        if (section.offsetTop - 150 <= y) {
                            current = section.id;
                        }
                    }
                    setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return { scrollY, activeSection, scrollProgress };
        }

        // Enhanced Intersection Observer with reveal animations
        function useInView(options = {}) {
            const ref = useRef(null);
            const [isInView, setIsInView] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsInView(true);
                        // Add reveal class to children with data-reveal
                        const el = entry.target;
                        el.querySelectorAll('[data-reveal]').forEach((child, index) => {
                            const delay = child.getAttribute('data-delay') || index * 0.1;
                            child.style.transitionDelay = `${delay}s`;
                            child.classList.add('revealed');
                        });
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.08, ...options });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return [ref, isInView];
        }

        // Parallax scroll hook
        function useParallax(speed = 0.3) {
            const [offset, setOffset] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    setOffset(window.scrollY * speed);
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, [speed]);
            return offset;
        }

        // Lazy image component
        function LazyImage({ src, alt, className, style, onClick, loading = 'lazy' }) {
            const [loaded, setLoaded] = useState(false);
            const [error, setError] = useState(false);
            return (
                <img
                    src={src}
                    alt={alt}
                    className={`${className || ''} lazy-img ${loaded ? 'loaded' : 'img-skeleton'}`}
                    style={style}
                    onClick={onClick}
                    loading={loading}
                    onLoad={() => setLoaded(true)}
                    onError={() => setError(true)}
                    referrerPolicy="no-referrer"
                />
            );
        }

        // ===== COMPONENTS =====

        // Header with scroll tracking
        function Header() {
            const { scrollY, activeSection } = useScrollPosition();
            const [menuOpen, setMenuOpen] = useState(false);

            const scrollToSection = useCallback((id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    setMenuOpen(false);
                }
            }, []);

            return (
                <header className={`header ${scrollY > 100 ? 'scrolled' : ''}`}>
                    <nav className="header-nav">
                        <a className="header-logo" href="#home" onClick={(e) => { e.preventDefault(); scrollToSection('home'); }}>
                            <div className="header-logo-icon">政</div>
                            <span className="header-logo-text">政协委员通</span>
                        </a>
                        <ul className={`header-links ${menuOpen ? 'active' : ''}`}>
                            {navItems.map(item => (
                                <li key={item.id}>
                                    <a
                                        href={`#${item.id}`}
                                        className={activeSection === item.id ? 'active' : ''}
                                        onClick={(e) => { e.preventDefault(); scrollToSection(item.id); }}
                                    >
                                        {item.label}
                                    </a>
                                </li>
                            ))}
                        </ul>
                        <button
                            className={`menu-toggle ${menuOpen ? 'open' : ''}`}
                            onClick={() => setMenuOpen(!menuOpen)}
                            aria-label="菜单切换"
                        >
                            <span></span><span></span><span></span>
                        </button>
                    </nav>
                </header>
            );
        }

        // Hero section with parallax
        function Hero() {
            const parallaxOffset = useParallax(0.4);
            const { scrollY } = useScrollPosition();
            const contentOpacity = Math.max(0, 1 - scrollY / 600);
            const contentTranslate = scrollY * 0.2;

            return (
                <section className="hero" id="home">
                    <div className="hero-pattern" style={{ transform: `translateY(${parallaxOffset * 0.5}px)` }}></div>
                    <div className="hero-deco" style={{ transform: `translateY(${parallaxOffset * 0.3}px)` }}></div>
                    <div className="hero-deco" style={{ transform: `translateY(${parallaxOffset * 0.5}px)` }}></div>
                    <div className="hero-deco" style={{ transform: `translateY(${parallaxOffset * 0.2}px)` }}></div>
                    <div className="hero-content" style={{ opacity: contentOpacity, transform: `translateY(${contentTranslate}px)` }}>
                        <div className="hero-badge">杭州市上城区</div>
                        <h1 className="hero-title">政协委员通</h1>
                        <p className="hero-subtitle">凝聚共识、汇聚力量，为上城区高质量发展贡献政协智慧和力量</p>
                        <div className="hero-actions">
                            <a href="#modules" className="btn btn-primary" onClick={(e) => { e.preventDefault(); document.getElementById('modules')?.scrollIntoView({ behavior: 'smooth' }); }}>探索模块</a>
                            <a href="#gallery" className="btn btn-outline" onClick={(e) => { e.preventDefault(); document.getElementById('gallery')?.scrollIntoView({ behavior: 'smooth' }); }}>查看风采</a>
                        </div>
                    </div>
                    <div className="hero-scroll-hint" style={{ opacity: contentOpacity }}>
                        <div className="scroll-mouse"></div>
                        <span>向下滚动</span>
                    </div>
                </section>
            );
        }

        // Stats bar
        function Stats() {
            const [ref, isInView] = useInView();
            const stats = [
                { number: 14, suffix: '', label: '街道委员小组' },
                { number: 16, suffix: '', label: '界别组织' },

                if (star === 5) return '★★★★★ 五星级';
                if (star === 4) return '★★★★ 四星级';
                if (star === 3) return '★★★ 三星级';
                return '';

            // First 25 studios with photos
            const photoStudios = studiosData;

            const extraStudios = extendedStudiosData;

            return (
                <section className="studios-section" id="studios">
                    <SectionHeader tag="委员工作室" title="委员工作室风采" desc={`各具特色的委员工作室，展示多元化的履职方式和创新实践 (共50个，五星25个·四星17个·三星8个)`} />
                    <div className="studios-grid" ref={ref}>

                            <div

                                className="studio-card reveal-up"

                                data-delay={Math.min(i, 11) * 0.06}

                                style={{ animation: isInView ? `fadeInUp 0.5s ease ${Math.min(i, 11) * 0.06}s both` : 'none' }}

                                    <LazyImage src={studio.img} alt={studio.name} />

                                        <span className={`studio-badge ${getStarClass(studio.star)}`}>{getStarLabel(studio.star)}</span>

                                    <span className="studio-click-hint">查看详情</span>
                                </div>
                                <div className="studio-info">
                                    <h4>{studio.name}</h4>
                                    <p>{studio.activity}</p>
                                    <div className="studio-tags">
                                        {studio.star === 5 && <span className="studio-tag">五星示范</span>}
                                        {studio.star === 4 && <span className="studio-tag">四星优秀</span>}

                                    </div>
                                </div>
                            </div>

                        <div style={{ maxWidth: '1400px', margin: '2rem auto 0', display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem' }}>

                                <div
                                    key={i}
                                    className="reveal-up revealed"
                                    style={{
                                        background: 'white', borderRadius: 'var(--radius)', padding: '1.2rem 1.5rem',
                                        boxShadow: '0 4px 16px rgba(0,0,0,0.06)', border: '1px solid rgba(0,0,0,0.04)',
                                        display: 'flex', alignItems: 'center', gap: '1rem',
                                        animation: isInView ? `fadeInUp 0.4s ease ${(i % 6) * 0.05}s both` : 'none'
                                    }}
                                >
                                    <div style={{
                                        width: '48px', height: '48px', borderRadius: '12px', flexShrink: 0,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        background: studio.star === 5 ? 'linear-gradient(135deg, #D4AF37, #F0D78C)' :
                                                    studio.star === 4 ? 'linear-gradient(135deg, #8B8B8B, #C0C0C0)' :
                                                    'linear-gradient(135deg, #CD7F32, #E8A85C)',
                                        color: studio.star === 5 ? '#5D4E00' : studio.star === 4 ? '#333' : '#5D3A00',
                                        fontWeight: 700, fontSize: '1.1rem', fontFamily: "'Noto Serif SC', serif"
                                    }}>
                                        {studio.star === 5 ? '★5' : studio.star === 4 ? '★4' : '★3'}
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <h4 style={{ fontFamily: "'Noto Serif SC', serif", fontSize: '0.95rem', fontWeight: 600, color: 'var(--text-dark)', marginBottom: '0.2rem', lineHeight: 1.3 }}>{studio.name}</h4>
                                        <p style={{ color: 'var(--text-light)', fontSize: '0.78rem', lineHeight: 1.4 }}>负责人：{studio.leader} · {studio.address}</p>
                                    </div>
                                    <span style={{
                                        padding: '0.2rem 0.6rem', borderRadius: '12px', fontSize: '0.72rem', fontWeight: 500, flexShrink: 0,

                    <div style={{ textAlign: 'center', marginTop: '2rem' }}>
                        <button className="btn btn-primary" onClick={() => setShowAll(!showAll)}>
                            {showAll ? '收起 ▲ 只显示有照片的工作室' : `展开全部50个工作室 ▼ (还有${extraStudios.length}个)`}
                        </button>
                    </div>
                </section>
            );
        }

        // Image Lightbox Modal
        function ImageModal({ src, caption, onClose }) {
            useEffect(() => {
                const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handleKey);
                document.body.style.overflow = 'hidden';
                return () => {
                    document.removeEventListener('keydown', handleKey);
                    document.body.style.overflow = '';
                };
            }, [onClose]);

            return (
                <div className="modal-overlay active" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-container">
                        <button className="modal-close" onClick={onClose}>&times;</button>
                        <LazyImage src={src} alt={caption || ''} className="" loading="eager" />
                        {caption && <div className="modal-caption">{caption}</div>}
                    </div>
                </div>
            );
        }

        // Module Detail Modal
        function DetailModal({ module, onClose, onOpenImage }) {
            useEffect(() => {
                const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handleKey);
                document.body.style.overflow = 'hidden';
                return () => {
                    document.removeEventListener('keydown', handleKey);
                    document.body.style.overflow = '';
                };
            }, [onClose]);

            if (!module) return null;

            return (
                <div className="detail-modal active" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="detail-container">
                        <div className="detail-header">
                            <button className="detail-close" onClick={onClose}>&times;</button>
                            <h2>{module.title}</h2>
                            <p>{module.desc}</p>
                        </div>
                        <div className="detail-body">
                            <div className="detail-section">
                                <h3>模块介绍</h3>
                                <p>{module.content}</p>
                            </div>
                            <div className="detail-section">
                                <h3>相关照片 ({module.images.length})</h3>
                                <div className="detail-images">
                                    {module.images.map((img, i) => (
                                        <LazyImage
                                            key={i}
                                            src={img}
                                            alt={`${module.title} 照片${i + 1}`}
                                            onClick={() => onOpenImage(img, module.title)}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Back to top button
        function BackToTop({ scrollY }) {
            return (
                <button
                    className={`back-to-top ${scrollY > 400 ? 'visible' : ''}`}
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    aria-label="回到顶部"
                >
                    ↑
                </button>
            );
        }

        // Scroll progress bar
        function ScrollProgressBar({ progress }) {
            return (
                <div className="scroll-progress" style={{ transform: `scaleX(${progress})` }}></div>
            );
        }

        // Side scroll indicator
        function ScrollSideIndicator({ activeSection }) {
            const scrollTo = useCallback((id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            }, []);
            return (
                <div className="scroll-indicator">
                    {navItems.map(item => (
                        <div
                            key={item.id}
                            className={`scroll-indicator-dot ${activeSection === item.id ? 'active' : ''}`}
                            data-label={item.label}
                            onClick={() => scrollTo(item.id)}
                        />
                    ))}
                </div>
            );
        }

        // ===== SMOOTH INERTIAL SCROLL HOOK =====
        // Intercepts native wheel events and applies smooth, momentum-based scrolling
        // like iOS/macOS — the page glides freely with inertia and deceleration
        function useSmoothScroll() {
            useEffect(() => {
                const html = document.documentElement;

                // Scroll state
                let currentY = window.scrollY;
                let targetY = window.scrollY;
                let velocity = 0;
                let animationId = null;
                let isRunning = false;
                let lastWheelTime = 0;
                let wheelAccumulator = 0;

                // Configuration
                const LERP_FACTOR = 0.12;          // How quickly currentY catches targetY (lower = smoother)
                const VELOCITY_DECAY = 0.92;       // How fast momentum decays after wheel stops
                const VELOCITY_THRESHOLD = 0.3;    // Stop animation when velocity drops below this
                const WHEEL_SENSITIVITY = 1.0;     // Multiplier for wheel delta
                const WHEEL_DELTA_MODE_LINE = 40;  // Normalize line-mode delta

                // Keep currentY synced if something else scrolls (e.g. scrollIntoView, keyboard)
                const onNativeScroll = () => {
                    const newY = window.scrollY;
                    // If the scroll position changed significantly and we didn't cause it,
                    // it's an external scroll — sync our state
                    if (!isRunning || Math.abs(newY - currentY) > 50) {
                        currentY = newY;
                        targetY = newY;
                        velocity = 0;
                    }
                };

                const onWheel = (e) => {
                    e.preventDefault();

                    let delta = e.deltaY;
                    // Normalize deltaMode
                    if (e.deltaMode === 1) delta *= WHEEL_DELTA_MODE_LINE;
                    else if (e.deltaMode === 2) delta *= WHEEL_DELTA_MODE_LINE * 3;

                    delta *= WHEEL_SENSITIVITY;

                    const now = Date.now();
                    const dt = now - lastWheelTime;

                    // Track rapid successive wheel events for momentum building
                    if (dt < 200) {
                        wheelAccumulator += Math.abs(delta);
                    } else {
                        wheelAccumulator = Math.abs(delta);
                    }
                    lastWheelTime = now;

                    // Apply acceleration for fast wheel scrolling
                    const boost = Math.min(wheelAccumulator / 800, 1.5);
                    delta *= (1 + boost * 0.3);

                    // Update target position
                    targetY += delta;

                    // Clamp target within scroll bounds
                    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                    targetY = Math.max(0, Math.min(targetY, maxScroll));

                    // Calculate velocity from wheel input
                    velocity = targetY - currentY;

                    if (!isRunning) {
                        isRunning = true;
                        html.classList.add('is-smooth-scrolling');
                        animate();
                    }
                };

                const animate = () => {
                    // Interpolate current position toward target
                    const diff = targetY - currentY;

                    // If still receiving recent wheel input, track velocity
                    const timeSinceWheel = Date.now() - lastWheelTime;
                    if (timeSinceWheel > 80) {
                        // Wheel stopped — apply momentum decay
                        velocity *= VELOCITY_DECAY;
                        targetY = currentY + velocity;

                        // Clamp
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        targetY = Math.max(0, Math.min(targetY, maxScroll));

                        // Stop when velocity is negligible
                        if (Math.abs(velocity) < VELOCITY_THRESHOLD && Math.abs(diff) < 0.5) {
                            currentY = targetY;
                            window.scrollTo(0, currentY);
                            isRunning = false;
                            html.classList.remove('is-smooth-scrolling');
                            return;
                        }
                    }

                    // Lerp toward target
                    currentY += diff * LERP_FACTOR;

                    // Apply scroll
                    window.scrollTo(0, Math.round(currentY));

                    animationId = requestAnimationFrame(animate);
                };

                // Listen for wheel with { passive: false } to preventDefault
                window.addEventListener('wheel', onWheel, { passive: false });
                window.addEventListener('scroll', onNativeScroll, { passive: true });

                return () => {
                    window.removeEventListener('wheel', onWheel);
                    window.removeEventListener('scroll', onNativeScroll);
                    if (animationId) cancelAnimationFrame(animationId);
                    html.classList.remove('is-smooth-scrolling');
                };
            }, []);

            return null;
        }

        // ===== ROOT APP COMPONENT =====
        function App() {
            const [imageModal, setImageModal] = useState(null); // { src, caption }
            const [detailModal, setDetailModal] = useState(null); // module object
            const { scrollY, activeSection, scrollProgress } = useScrollPosition();
            useSmoothScroll(); // Enable smooth inertial scrolling

            const openImage = useCallback((src, caption) => {
                setImageModal({ src, caption });
            }, []);

            const closeImage = useCallback(() => {
                setImageModal(null);
            }, []);

            const openDetail = useCallback((module) => {
                setDetailModal(module);
            }, []);

            const closeDetail = useCallback(() => {
                setDetailModal(null);
            }, []);

            return (
                <>
                    <ScrollProgressBar progress={scrollProgress} />
                    <Header />
                    <ScrollSideIndicator activeSection={activeSection} />
                    <Hero />
                    <Stats />
                    <Modules onOpenDetail={openDetail} />
                    <Boundaries onOpenImage={openImage} />
                    <SubCenter onOpenImage={openImage} />
                    <Gallery onOpenImage={openImage} />
                    <Studios onOpenImage={openImage} />
                    <Timeline />
                    <Footer />
                    <BackToTop scrollY={scrollY} />

                    {/* Modals rendered via React root */}
                    {imageModal && (
                        <ImageModal src={imageModal.src} caption={imageModal.caption} onClose={closeImage} />
                    )}
                    <DetailModal module={detailModal} onClose={closeDetail} onOpenImage={openImage} />
                </>
            );
        }

        // ===== REACT ROOT RENDERING =====
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
